services:
  ppp-backend:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    environment:
      PPP_HOST: 0.0.0.0
      PPP_PORT: 8000
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "backend/healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      ppp-backend:
        condition: service_healthy
    ports:
      - "${PPP_HOST_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
