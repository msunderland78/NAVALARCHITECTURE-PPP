version: "3.8"

services:
  ppp-backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PPP_HOST: 0.0.0.0
      PPP_PORT: 8000
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - ppp-backend
    ports:
      - "${PPP_HOST_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
