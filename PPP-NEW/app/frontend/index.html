<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PPP Web</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Performance Prediction Program</h1>
      <p>Holtrop and Mennen resistance and powering workspace</p>
    </div>
    <div class="status" id="status">Ready</div>
  </header>

  <main class="workspace">
    <form class="inputs" id="case-form">
      <section>
        <h2>Project</h2>
        <div class="grid two">
          <label>Project name<input name="project.name" value="Holtrop and Mennen Example"></label>
          <label>Run ID<input name="project.run_id" value="Test 1.0"></label>
        </div>
      </section>

      <section>
        <h2>Speed Range</h2>
        <div class="grid three">
          <label>Initial speed, kn<input name="speed_sweep.initial_speed_knots" type="number" step="0.01" value="15"></label>
          <label>Increment, kn<input name="speed_sweep.speed_increment_knots" type="number" min="0" step="0.01" value="2"></label>
          <label>Points<input name="point_count" type="number" min="1" max="20" step="1" value="8"></label>
        </div>
      </section>

      <section>
        <h2>Hull</h2>
        <div class="grid four">
          <label>LWL, m<input name="hull.lwl_m" type="number" min="0.01" step="0.01" value="212"></label>
          <label>Beam, m<input name="hull.beam_lwl_m" type="number" min="0.01" step="0.01" value="32"></label>
          <label>Draft fwd, m<input name="hull.draft_forward_m" type="number" min="0.01" step="0.01" value="11"></label>
          <label>Draft aft, m<input name="hull.draft_aft_m" type="number" min="0.01" step="0.01" value="11"></label>
          <label>CB<input name="hull.block_coefficient" type="number" min="0.0001" max="1" step="0.0001" value="0.6"></label>
          <label>CM<input name="hull.midship_coefficient" type="number" min="0.0001" max="1" step="0.0001" value="0.98"></label>
          <label>CWP<input name="hull.waterplane_coefficient" type="number" min="0.0001" max="1" step="0.0001" value="0.75"></label>
          <label>LCB, % LWL<input name="hull.lcb_percent_lwl_from_midships_forward_positive" type="number" step="0.01" value="-0.75"></label>
        </div>
      </section>

      <section>
        <h2>Features</h2>
        <div class="grid four">
          <label>Bulb area, m2<input name="features.bulb_area_station_0_m2" type="number" min="0" step="0.01" value="21"></label>
          <label>Bulb center, m<input name="features.bulb_vertical_center_m" type="number" min="0" step="0.01" value="4"></label>
          <label>Transom area, m2<input name="features.transom_immersed_area_zero_speed_m2" type="number" min="0" step="0.01" value="16"></label>
          <label>Stern type<select name="features.stern_type">
            <option value="normal_shaped_sections">Normal shaped sections</option>
            <option value="v_shaped_sections">V-shaped sections</option>
            <option value="u_shaped_sections_with_hogner_stern">U-shaped sections with Hogner stern</option>
            <option value="pram_with_gondola">Pram with gondola</option>
          </select></label>
        </div>
      </section>

      <section>
        <h2>Propulsion And Drag</h2>
        <div class="grid four">
          <label>Propulsion<select name="propulsion.type">
            <option value="single_screw_conventional_stern">Single-screw conventional stern</option>
            <option value="single_screw_open_flow_stern">Single-screw open-flow stern</option>
            <option value="twin_screw">Twin screw</option>
          </select></label>
          <label>Propeller Dp, m<input name="propulsion.propeller_diameter_m" type="number" min="0.01" step="0.01" value="8"></label>
          <label>Ae/Ao<input name="propulsion.expanded_area_ratio" type="number" min="0" max="1" step="0.0001" value="0.8"></label>
          <label>Appendage mode<select name="appendages.mode">
            <option value="percent_bare_hull_resistance">Percent bare hull</option>
            <option value="equivalent_area_form_factor">SAPP(1+K2)</option>
          </select></label>
          <label>Appendage, %<input name="appendages.percent_bare_hull_resistance" type="number" min="0" step="0.01" value="5"></label>
          <label>SAPP(1+K2), m2<input name="appendages.equivalent_wetted_area_form_factor_m2" type="number" min="0" step="0.01" value="0"></label>
        </div>
      </section>

      <section>
        <h2>Modeling</h2>
        <div class="grid four">
          <label>Air drag<select name="modeling.air_drag">
            <option value="true">Yes</option>
            <option value="false">No</option>
          </select></label>
          <label>Depth at bow, m<input name="modeling.depth_at_bow_m" type="number" min="0.01" step="0.01" value="21"></label>
          <label>Frontal area, m2<input name="modeling.deckhouse_cargo_frontal_area_m2" type="number" min="0" step="0.01" value="321"></label>
          <label>Surface mode<select name="modeling.wetted_surface_mode">
            <option value="user">User</option>
            <option value="estimated">Estimated</option>
          </select></label>
          <label>Wetted surface, m2<input name="modeling.wetted_surface_m2" type="number" min="0.01" step="0.01" value="7890"></label>
          <label>Angle mode<select name="modeling.half_angle_entrance_mode">
            <option value="user">User</option>
            <option value="estimated">Estimated</option>
          </select></label>
          <label>Half angle, deg<input name="modeling.half_angle_entrance_degrees" type="number" min="0.01" step="0.01" value="12.11"></label>
        </div>
      </section>

      <section>
        <h2>Water And Margin</h2>
        <div class="grid four">
          <label>Water<select name="water.type">
            <option value="salt_water_15_c">Salt water, 15 C</option>
            <option value="fresh_water_15_c">Fresh water, 15 C</option>
            <option value="custom">Custom</option>
          </select></label>
          <label>Density, kg/m3<input name="water.density_kg_m3" type="number" min="0.001" step="0.001" value="1025.87"></label>
          <label>Nu, m2/s<input name="water.kinematic_viscosity_m2_s" type="number" min="0.000000001" step="0.000000001" value="0.00000118831"></label>
          <label>Margin, %<input name="margin.design_margin_percent" type="number" min="0" step="0.01" value="5"></label>
        </div>
      </section>

      <section>
        <h2>Legacy Oracle</h2>
        <div class="grid four">
          <label>First record<select name="legacy_options.first_record_order">
            <option value="">Default</option>
            <option value="depth_before_drafts">Depth before drafts</option>
            <option value="drafts_before_depth">Drafts before depth</option>
          </select></label>
          <label>Propeller record<select name="legacy_options.propeller_record_order">
            <option value="">Default</option>
            <option value="wetted_half_dp">Wetted, half, Dp</option>
            <option value="dp_wetted_half">Dp, wetted, half</option>
          </select></label>
          <label>Stern correction<input name="legacy_options.stern_correction" type="number" step="1"></label>
          <label>P/Dp<input name="legacy_options.pitch_diameter_ratio" type="number" min="0" step="0.01"></label>
          <label>Water code<input name="legacy_options.water_type_code" type="number" min="1" step="1"></label>
          <label>Appendage primary<input name="legacy_options.appendage_primary_value" type="number" step="0.01"></label>
          <label>Appendage model total<input name="legacy_options.appendage_model_total" type="number" step="0.01"></label>
          <label>Compare tolerance, kn<input name="legacy_options.speed_tolerance" type="number" min="0" step="0.000001" value="0.000001"></label>
        </div>
      </section>

      <div class="actions">
        <button type="submit">Run</button>
        <button type="button" id="case-json-button">Case JSON</button>
        <button type="button" id="csv-button">CSV</button>
        <button type="button" id="json-button">JSON</button>
        <button type="button" id="report-button">Report MD</button>
        <button type="button" id="legacy-in-button">Legacy IN</button>
        <button type="button" id="print-button">Print</button>
        <label class="file-action">Import JSON<input type="file" id="import-json-file" accept=".json,application/json"></label>
        <label class="file-action">Import .PPP<input type="file" id="import-file" accept=".ppp"></label>
        <label class="file-action">Compare OUT<input type="file" id="import-out-file" accept=".out,.txt,text/plain"></label>
      </div>
    </form>

    <section class="outputs">
      <div class="summary" id="summary"></div>
      <div class="engineering-note" id="engineering-note"></div>
      <div class="checks" id="checks"></div>
      <canvas id="plot" width="900" height="360"></canvas>
      <div class="oracle" id="oracle"></div>
      <div class="table-wrap">
        <table id="results-table">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
